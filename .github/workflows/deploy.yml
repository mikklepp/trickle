name: Deploy to AWS

on:
  push:
    branches:
      - main

# Serialize deploys. Multiple pushes landing close together would otherwise
# run in parallel against the same CloudFormation stack and collide
# ("Cannot delete ChangeSet in status CREATE_IN_PROGRESS"). Queue them instead;
# never cancel an in-flight deploy — interrupting a live CFN changeset can wedge
# the stack.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: "eu-north-1"

      - name: Deploy to AWS
        run: npm run deploy
        env:
          CDK_STAGE: production
          CDK_REGION: ${{ secrets.CDK_REGION }}
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
