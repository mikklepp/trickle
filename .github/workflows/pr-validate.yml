name: PR Validation

on:
  pull_request:
    branches:
      - main
      - cdk

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # NOTE: PR validation deliberately does NOT run `cdk synth`. Synth needs
      # AWS (STS account lookup + Route53 HostedZone.fromLookup in the CDK app),
      # and Dependabot PRs run without repo secrets, so any AWS step fails before
      # the build. We validate everything that can run credential-free instead;
      # synth is exercised on the deploy workflow (push to main).

      - name: Typecheck
        run: npm run typecheck

      - name: Build backend
        run: npm run build --workspace=backend

      # Import the built Lambda entrypoints exactly as the runtime would, to
      # catch module-load failures before they reach production. A worker that
      # dies at import (e.g. a CommonJS dep that require()s an ESM-only
      # transitive dep -> ERR_REQUIRE_ESM) is invisible to typecheck/build but
      # kills every invocation. This loads modules only; it constructs no AWS
      # clients' network calls, so it runs credential-free (incl. Dependabot).
      - name: Smoke-test built Lambda modules
        run: |
          node --input-type=module -e "
            await import('./backend/dist/worker/index.js');
            await import('./backend/dist/api/email.js');
            console.log('OK: built Lambda modules loaded without error');
          "

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Check formatting
        run: npm run format:check
