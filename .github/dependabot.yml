# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Root workspace. The root package-lock.json is the single lockfile that
  # governs the backend/cdk/frontend workspaces for local dev and CI, so this
  # one entry covers dependency updates across all three source trees.
  # NOTE: we intentionally do NOT declare per-directory npm entries for
  # cdk/ or frontend/ — those subdir lockfiles have been removed. The old
  # "npm_and_yarn group across 3 directories" PRs edited phantom subdir
  # lockfiles that conflicted with this root lockfile and always failed CI.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Hard cap so a Dependabot misfire can't flood the repo. With the grouping
    # below a normal week produces 1-2 PRs, well under this.
    open-pull-requests-limit: 5
    # Wait for a release to settle before opening a PR, to avoid churn and
    # dodge freshly-published bad releases. Give majors a longer soak.
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      # One PR for all routine (minor/patch) bumps across the workspace, prod
      # and dev alike. Majors are split into their own PR (below) since they
      # are more likely to break and warrant individual review.
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      npm-major:
        patterns:
          - "*"
        update-types:
          - "major"

  # Backend Lambda bundle. backend/package-lock.json is a standalone lockfile
  # that the backend build copies into dist/ and installs from, so it is the
  # actual deployed dependency surface and must be tracked separately.
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      backend-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      backend-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      # One PR for all GitHub Actions bumps rather than one per action.
      github-actions:
        patterns:
          - "*"
